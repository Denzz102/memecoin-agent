<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <title>Health Monitor</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark text-light">
    <div class="container py-5">
      <h1 class="mb-4">🩺 AI Agent Health Monitor</h1>

      <div class="row g-4">
        <div class="col-md-3">
          <div class="card bg-success text-white">
            <div class="card-body">
              <h6>Scanner</h6>

              <h3 id="scanner">...</h3>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card bg-primary text-white">
            <div class="card-body">
              <h6>Database</h6>

              <h3 id="database">...</h3>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card bg-info text-white">
            <div class="card-body">
              <h6>Telegram</h6>

              <h3 id="telegram">...</h3>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card bg-warning">
            <div class="card-body">
              <h6>AI</h6>

              <h3 id="ai">...</h3>
            </div>
          </div>
        </div>
      </div>

      <hr class="my-4" />

      <div class="row g-4">
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h6>Total Tokens</h6>

              <h2 id="totalTokens">0</h2>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h6>BUY</h6>

              <h2 id="buy">0</h2>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h6>WATCH</h6>

              <h2 id="watch">0</h2>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <h6>AVOID</h6>

              <h2 id="avoid">0</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-4">
        <h5>Last Scan</h5>

        <p id="lastScan">...</p>
      </div>
    </div>

    <script src="/js/health.js"></script>
  </body>
</html>
